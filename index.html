        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-17.35356615777981,145.6785728069343],[-16.946615056561928,146.23497261347924]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        function pop_WetTropicsWorldHeritageArea_0(feature, layer) {
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        var pattern_WetTropicsWorldHeritageArea_0_0 = new L.StripePattern({
            weight: 0.3,
            spaceWeight: 2.0,
            color: '#ffec41',
            opacity: 1.0,
            spaceOpacity: 0,
            angle: 225
        });
        pattern_WetTropicsWorldHeritageArea_0_0.addTo(map);
        function style_WetTropicsWorldHeritageArea_0_0() {
            return {
                pane: 'pane_WetTropicsWorldHeritageArea_0',
                stroke: false,
                fillOpacity: 1,
                fillPattern: pattern_WetTropicsWorldHeritageArea_0_0,
                interactive: true,
            }
        }
        function style_WetTropicsWorldHeritageArea_0_1() {
            return {
                pane: 'pane_WetTropicsWorldHeritageArea_0',
                opacity: 1,
                color: 'rgba(255,236,65,0.8313725490196079)',
                dashArray: '',

                lineJoin: 'bevel',

                fillOpacity: 0,

            }
        }
        map.createPane('pane_WetTropicsWorldHeritageArea_0');
        map.getPane('pane_WetTropicsWorldHeritageArea_0').style.zIndex = 400;
        map.getPane('pane_WetTropicsWorldHeritageArea_0').style['mix-blend-mode'] = 'normal';
        var layer_WetTropicsWorldHeritageArea_0 = new L.geoJson.multiStyle(json_WetTropicsWorldHeritageArea_0, {
            attribution: '',
            interactive: true,
            dataVar: 'json_WetTropicsWorldHeritageArea_0',
            layerName: 'layer_WetTropicsWorldHeritageArea_0',
            pane: 'pane_WetTropicsWorldHeritageArea_0',
            onEachFeature: pop_WetTropicsWorldHeritageArea_0,
            styles: [style_WetTropicsWorldHeritageArea_0_0,style_WetTropicsWorldHeritageArea_0_1,]
        });
        bounds_group.addLayer(layer_WetTropicsWorldHeritageArea_0);
        map.addLayer(layer_WetTropicsWorldHeritageArea_0);
        function pop_ProtectedAreas_1(feature, layer) {

                    </tr>\

        var layer_ProtectedAreas_1 = new L.geoJson(json_ProtectedAreas_1, {

        var layer_EssentialHabitatVMA1999_2 = new L.geoJson.multiStyle(json_EssentialHabitatVMA1999_2, {

            onEachFeature: pop_EssentialHabitatVMA1999_2,

        function pop_SouthernCassowaryRecords_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">year</th>\

        function style_SouthernCassowaryRecords_3_0() {
            return {
                pane: 'pane_SouthernCassowaryRecords_3',
                radius: 6.0,
                opacity: 1,

        }
        map.createPane('pane_SouthernCassowaryRecords_3');
        map.getPane('pane_SouthernCassowaryRecords_3').style.zIndex = 403;
        map.getPane('pane_SouthernCassowaryRecords_3').style['mix-blend-mode'] = 'normal';
        var layer_SouthernCassowaryRecords_3 = new L.geoJson(json_SouthernCassowaryRecords_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_SouthernCassowaryRecords_3',
            layerName: 'layer_SouthernCassowaryRecords_3',
            pane: 'pane_SouthernCassowaryRecords_3',
            onEachFeature: pop_SouthernCassowaryRecords_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.shapeMarker(latlng, style_SouthernCassowaryRecords_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_SouthernCassowaryRecords_3);
        map.addLayer(layer_SouthernCassowaryRecords_3);
        var overlaysTree = [
            {label: '<img src="legend/SouthernCassowaryRecords_3.png" /> Southern Cassowary Records', layer: layer_SouthernCassowaryRecords_3},
            {label: '<img src="legend/EssentialHabitatVMA1999_2.png" /> Essential Habitat (VMA 1999)', layer: layer_EssentialHabitatVMA1999_2},
            {label: '<img src="legend/ProtectedAreas_1.png" /> Protected Areas', layer: layer_ProtectedAreas_1},
            {label: '<img src="legend/WetTropicsWorldHeritageArea_0.png" /> Wet Tropics World Heritage Area', layer: layer_WetTropicsWorldHeritageArea_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        </script>        
    </body>
